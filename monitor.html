<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElderGo Cloud Monitoring Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    
    <nav class="bg-slate-900 text-white px-6 py-4 shadow-md flex justify-between items-center">
        <div class="text-xl font-bold tracking-wide">ElderGo CloudOps</div>
        <div class="flex items-center gap-2 text-sm">
            <span id="connection-status" class="text-slate-400">&#9679;</span>
            <span id="connection-text">Connecting...</span>
        </div>
    </nav>

    <main class="p-6 max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col min-h-[500px]">
            <div class="px-6 py-4 border-b border-slate-100 font-semibold text-slate-800">
                Live Location Tracking
            </div>
            <div id="map-container" class="flex-1 bg-slate-100 flex items-center justify-center relative overflow-hidden rounded-b-xl">
                <span class="text-slate-400 font-medium">Map SDK Integration Area</span>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[500px]">
            <div class="px-6 py-4 border-b border-slate-100 font-semibold text-red-600 flex justify-between items-center">
                <span>Anomaly Alerts</span>
                <span class="bg-red-100 text-red-700 py-1 px-2 rounded-md text-xs" id="alert-counter">0</span>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3" id="alert-stream">
            </div>
        </div>

        <div class="lg:col-span-3 bg-white rounded-xl shadow-sm border border-slate-200">
            <div class="px-6 py-4 border-b border-slate-100 font-semibold text-slate-800">
                Active Device Roster
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-slate-500">
                        <tr>
                            <th class="px-6 py-3 font-medium">Device ID</th>
                            <th class="px-6 py-3 font-medium">Network Status</th>
                            <th class="px-6 py-3 font-medium">Battery Level</th>
                            <th class="px-6 py-3 font-medium">Operation Mode</th>
                        </tr>
                    </thead>
                    <tbody id="device-table-body" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const host = 'wss://broker.emqx.io:8084/mqtt';
        const clientId = 'eldergo_dash_' + Math.random().toString(16).substring(2, 8);
        
        const client = mqtt.connect(host, { clientId: clientId });

        const statusIndicator = document.getElementById('connection-status');
        const statusText = document.getElementById('connection-text');
        let alertCount = 0;

        client.on('connect', () => {
            statusIndicator.className = 'text-emerald-500';
            statusText.textContent = 'Connected';
            
            client.subscribe('aether/eldergo/+/telemetry');
            client.subscribe('aether/eldergo/+/alerts');
        });

        client.on('offline', () => {
            statusIndicator.className = 'text-red-500';
            statusText.textContent = 'Disconnected';
        });

        client.on('message', (topic, message) => {
            try {
                const payload = JSON.parse(message.toString());
                
                if (topic.endsWith('/telemetry')) {
                    updateDeviceRow(payload);
                } else if (topic.endsWith('/alerts')) {
                    triggerAlert(payload);
                }
            } catch (e) {
                console.error(e);
            }
        });

        function updateDeviceRow(data) {
            const tbody = document.getElementById('device-table-body');
            let row = document.getElementById('device-' + data.id);
            
            if (!row) {
                row = document.createElement('tr');
                row.id = 'device-' + data.id;
                row.className = 'hover:bg-slate-50 transition-colors';
                tbody.appendChild(row);
            }
            
            const isOnline = data.status === 'online';
            const statusDot = isOnline ? 'text-emerald-500' : 'text-slate-300';
            
            let batteryColor = 'text-emerald-500';
            if (data.battery < 20) batteryColor = 'text-red-500';
            else if (data.battery < 50) batteryColor = 'text-amber-500';

            row.innerHTML = `
                <td class="px-6 py-4 font-medium text-slate-900">${data.id}</td>
                <td class="px-6 py-4 flex items-center gap-2 capitalize">
                    <span class="${statusDot} text-xs">&#9679;</span> 
                    ${data.status}
                </td>
                <td class="px-6 py-4">
                    <span class="font-medium ${batteryColor}">${data.battery}%</span>
                </td>
                <td class="px-6 py-4">
                    <span class="bg-slate-100 text-slate-700 py-1 px-3 rounded-full text-xs font-medium uppercase tracking-wide">
                        ${data.mode}
                    </span>
                </td>
            `;
        }

        function triggerAlert(data) {
            const stream = document.getElementById('alert-stream');
            const alertCard = document.createElement('div');
            
            alertCount++;
            document.getElementById('alert-counter').textContent = alertCount;
            
            const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            alertCard.className = 'p-4 rounded-lg bg-red-50 border border-red-100 animate-fade-in';
            alertCard.innerHTML = `
                <div class="flex justify-between items-start mb-1">
                    <span class="font-bold text-red-900">${data.id}</span>
                    <span class="text-xs text-red-500 font-medium">${timeString}</span>
                </div>
                <div class="text-sm text-red-700 font-medium capitalize mb-1">${data.type.replace('_', ' ')}</div>
                <div class="text-sm text-red-600">${data.message}</div>
            `;
            
            stream.prepend(alertCard);
        }
    </script>
</body>
</html>
